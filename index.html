{ ch:5, title:"Classes & Objects", emoji:"🎓", concepts:["class", "__init__", "self", "methods"],
  desc:'Classes are <strong>blueprints</strong> for creating objects — things that have their own data (attributes) and actions (methods). <code>__init__</code> sets up the object. <code>self</code> refers to the specific instance.',
  code:'class Pet:\n    def __init__(self, name, species, age):\n        self.name = name\n        self.species = species\n        self.age = age\n        self.hunger = 50      # starts half hungry\n        self.happiness = 50\n\n    def feed(self):\n        self.hunger = max(0, self.hunger - 25)\n        self.happiness = min(100, self.happiness + 10)\n        print(f"🍖 Fed {self.name}! Hunger: {self.hunger} | Happy: {self.happiness}")\n\n    def play(self):\n        self.hunger = min(100, self.hunger + 15)\n        self.happiness = min(100, self.happiness + 20)\n        print(f"🎾 Played with {self.name}! Hunger: {self.hunger} | Happy: {self.happiness}")\n\n    def status(self):\n        print(f"🐾 {self.name} the {self.species} (age {self.age})")\n        print(f"   Hunger: {self.hunger}/100 | Happiness: {self.happiness}/100")\n\n# Create pet objects from the blueprint\ndog = Pet("Buddy", "Golden Retriever", 3)\ncat = Pet("Whiskers", "Tabby Cat", 7)\n\ndog.status()\ndog.feed()\ndog.play()\nprint()\ncat.status()\ncat.feed()\n',
  challenge:'<strong>Mission:</strong> Create a <code>Student</code> class with name, grade, and a list of subjects. Add methods: <code>add_subject(name)</code>, <code>drop_subject(name)</code>, and <code>report_card()</code>. Create 2 students and test everything.',
  hint:'In <code>__init__</code>: <code>self.subjects = []</code>. In <code>add_subject</code>: <code>self.subjects.append(name)</code>. In <code>report_card</code>: loop through and print each subject.',
  check: function(o) { return o.trim().split('\n').filter(function(l){return l.trim();}).length >= 6; }
},

{ ch:5, title:"Class Interactions", emoji:"⚔️", concepts:["__str__", "object interaction", "encapsulation"],
  desc:'Classes get powerful when objects interact! <code>__str__</code> controls what <code>print(myobject)</code> shows. Methods can take other objects as parameters, enabling rich interactions.',
  code:'class BankAccount:\n    def __init__(self, owner, balance=0):\n        self.owner = owner\n        self.balance = balance\n        self.history = []\n\n    def __str__(self):\n        return f"💰 {self.owner} Account: ${self.balance:.2f}"\n\n    def deposit(self, amount):\n        self.balance += amount\n        self.history.append(f"Deposited ${amount:.2f}")\n        print(f"  ✅ Deposited ${amount:.2f}")\n\n    def withdraw(self, amount):\n        if amount > self.balance:\n            print(f"  ❌ Insufficient funds! (Balance: ${self.balance:.2f})")\n            return False\n        self.balance -= amount\n        self.history.append(f"Withdrew ${amount:.2f}")\n        print(f"  ✅ Withdrew ${amount:.2f}")\n        return True\n\n    def transfer(self, other, amount):\n        print(f"  📤 Transfer ${amount:.2f}: {self.owner} → {other.owner}")\n        if self.withdraw(amount):\n            other.deposit(amount)\n            return True\n        return False\n\n# Test it out\nalice = BankAccount("Alice", 500)\nbob = BankAccount("Bob", 200)\n\nprint(alice)\nprint(bob)\nprint()\nalice.deposit(100)\nalice.transfer(bob, 250)\nprint()\nprint(alice)\nprint(bob)\n',
  challenge:'<strong>Mission:</strong> Add a <code>show_history()</code> method. Then add a <code>VIPAccount</code> idea: if balance > $1000, deposits get a 5% bonus. Test transfers between accounts.',
  hint:'In <code>show_history</code>: loop through <code>self.history</code> and print each entry. For VIP bonus: <code>if self.balance > 1000: amount *= 1.05</code> inside deposit.',
  check: function(o) { return o.trim().split('\n').filter(function(l){return l.trim();}).length >= 6; }
},

{ ch:5, title:"Lists of Objects", emoji:"🗂️", concepts:["objects in lists", "sorting", "filtering", "lambda"],
  desc:'The real magic happens when you combine classes with lists! Create collections of objects, then search, filter, sort, and analyze them — just like a real database.',
  code:'class Game:\n    def __init__(self, title, genre, rating, hours_played):\n        self.title = title\n        self.genre = genre\n        self.rating = rating\n        self.hours = hours_played\n\n    def __str__(self):\n        stars = "⭐" * round(self.rating)\n        return f"{stars} {self.title} ({self.genre}) — {self.hours}hrs"\n\n# Build a game library\nlibrary = [\n    Game("Minecraft", "Sandbox", 5, 500),\n    Game("Fortnite", "Battle Royale", 4, 200),\n    Game("Zelda TOTK", "Adventure", 5, 150),\n    Game("Rocket League", "Sports", 4, 300),\n    Game("Stardew Valley", "Simulation", 5, 180),\n    Game("Among Us", "Party", 3, 50),\n    Game("Mario Kart 8", "Racing", 5, 120),\n]\n\n# Print all games\nprint("🎮 MY GAME LIBRARY")\nprint("-" * 50)\nfor game in library:\n    print(f"  {game}")\n\n# Filter: 5-star games only\nprint("\\n🏆 5-STAR GAMES:")\ntop_games = [g for g in library if g.rating == 5]\nfor g in top_games:\n    print(f"  {g.title}")\n\n# Sort by hours played\nprint("\\n⏰ MOST PLAYED:")\nby_hours = sorted(library, key=lambda g: g.hours, reverse=True)\nfor g in by_hours[:3]:\n    print(f"  {g.hours}hrs — {g.title}")\n\n# Total hours\ntotal = sum(g.hours for g in library)\nprint(f"\\n📊 Total gaming hours: {total}")\n',
  challenge:'<strong>Mission:</strong> Create a <code>Song</code> class (title, artist, duration_seconds). Build a playlist of 6+ songs. Print total duration as min:sec, find the longest song, and show all songs by one artist.',
  hint:'Total seconds: <code>sum(s.duration_seconds for s in playlist)</code>. Convert: <code>mins = total // 60</code>, <code>secs = total % 60</code>. Longest: <code>max(playlist, key=lambda s: s.duration_seconds)</code>.',
  check: function(o) { return o.trim().split('\n').filter(function(l){return l.trim();}).length >= 6; }
},

{ ch:5, title:"Bringing It Together", emoji:"🧩", concepts:["design", "combining concepts"],
  desc:'You now know variables, strings, math, decisions, loops, lists, dicts, functions, classes, error handling, and more — everything to build real programs! Let\'s combine them in a complex program.',
  code:'import random\n\nclass Player:\n    def __init__(self, name):\n        self.name = name\n        self.score = 0\n        self.streak = 0\n        self.best_streak = 0\n\n    def got_correct(self, points):\n        self.score += points\n        self.streak += 1\n        self.best_streak = max(self.best_streak, self.streak)\n        if self.streak >= 3:\n            bonus = self.streak * 2\n            self.score += bonus\n            print(f"  🔥 {self.streak}-STREAK! +{bonus} bonus!")\n\n    def got_wrong(self):\n        self.streak = 0\n\n    def summary(self):\n        print(f"\\n🏁 {self.name} - Results:")\n        print(f"  Score: {self.score} points")\n        print(f"  Best streak: {self.best_streak}")\n        if self.score >= 80:\n            print("  Rating: 🌟 LEGENDARY")\n        elif self.score >= 50:\n            print("  Rating: ⭐ Great!")\n        else:\n            print("  Rating: 👍 Keep practicing!")\n\ndef math_challenge(player, rounds=8):\n    ops = {\n        "+": lambda a, b: a + b,\n        "-": lambda a, b: a - b,\n        "x": lambda a, b: a * b,\n    }\n\n    print(f"\\n🧮 MATH BLITZ — {rounds} rounds!")\n    print(f"  Player: {player.name}\\n")\n\n    for r in range(1, rounds + 1):\n        a = random.randint(2, 15)\n        b = random.randint(2, 12)\n        op = random.choice(list(ops.keys()))\n        correct = ops[op](a, b)\n\n        # Simulate answer (70% chance correct)\n        if random.random() < 0.7:\n            answer = correct\n        else:\n            answer = correct + random.randint(-5, 5)\n\n        print(f"  Q{r}: {a} {op} {b} = ? → {answer}", end="")\n\n        if answer == correct:\n            player.got_correct(10)\n            print(f"  ✅ (+10 = {player.score}pts)")\n        else:\n            player.got_wrong()\n            print(f"  ❌ was {correct} ({player.score}pts)")\n\n    player.summary()\n\n# Play!\np = Player("Coder")\nmath_challenge(p)\n',
  challenge:'<strong>Mission:</strong> Add division problems (handle remainders!), add difficulty modes that change number ranges, or create a two-player mode that alternates turns and declares a winner.',
  hint:'For difficulty: create easy/medium/hard number ranges. Two-player: create two Player objects, alternate questions, compare scores at the end.',
  check: function(o) { return o.includes("Results") || o.includes("BLITZ"); }
},

{ ch:5, title:"🎮 RPG Battle!", emoji:"⚔️", project:true, concepts:["classes", "random", "loops", "everything!"],
  desc:'Your FINAL boss project: a turn-based RPG battle system! This epic program combines every single concept you\'ve learned. Study it, run it, then make it your own masterpiece.',
  code:'import random\n\nclass Fighter:\n    def __init__(self, name, hp, attack, defense, emoji):\n        self.name = name\n        self.max_hp = hp\n        self.hp = hp\n        self.attack = attack\n        self.defense = defense\n        self.emoji = emoji\n        self.potions = 2\n\n    def is_alive(self):\n        return self.hp > 0\n\n    def hp_bar(self):\n        bars = int((self.hp / self.max_hp) * 20)\n        return f"[{chr(9608) * bars}{chr(9617) * (20 - bars)}] {self.hp}/{self.max_hp}"\n\n    def do_attack(self, target):\n        roll = random.randint(1, 20)\n        if roll == 20:\n            dmg = self.attack * 2\n            actual = max(1, dmg - target.defense // 3)\n            target.hp = max(0, target.hp - actual)\n            print(f"  {chr(128165)} CRITICAL HIT! {self.name} deals {actual} damage!")\n        elif roll <= 2:\n            print(f"  {chr(128168)} {self.name} missed!")\n        else:\n            base_dmg = random.randint(self.attack // 2, self.attack)\n            actual = max(1, base_dmg - target.defense // 3)\n            target.hp = max(0, target.hp - actual)\n            print(f"  {chr(9876)}{chr(65039)} {self.name} attacks for {actual} damage!")\n\n    def use_potion(self):\n        if self.potions > 0:\n            heal = random.randint(20, 35)\n            self.hp = min(self.max_hp, self.hp + heal)\n            self.potions -= 1\n            print(f"  {chr(129514)} {self.name} heals +{heal} HP! ({self.potions} potions left)")\n        else:\n            print(f"  {chr(10060)} {self.name} has no potions!")\n            self.do_attack(self)\n\ndef battle(hero, boss):\n    print()\n    print("=" * 46)\n    print(f"  {hero.emoji} {hero.name}  VS  {boss.emoji} {boss.name}")\n    print("=" * 46)\n    print()\n\n    turn = 1\n    while hero.is_alive() and boss.is_alive():\n        print(f"--- Turn {turn} ---")\n        print(f"  {hero.emoji} {hero.name}: {hero.hp_bar()}")\n        print(f"  {boss.emoji} {boss.name}: {boss.hp_bar()}")\n\n        # Hero AI\n        if hero.hp < hero.max_hp * 0.3 and hero.potions > 0:\n            hero.use_potion()\n        else:\n            hero.do_attack(boss)\n\n        if not boss.is_alive():\n            break\n\n        # Boss AI\n        if boss.hp < boss.max_hp * 0.25 and boss.potions > 0:\n            boss.use_potion()\n        else:\n            boss.do_attack(hero)\n\n        turn += 1\n        print()\n\n    print()\n    print("=" * 46)\n    if hero.is_alive():\n        print(f"  {chr(127942)} {hero.name} WINS with {hero.hp} HP remaining!")\n    else:\n        print(f"  {chr(128128)} {boss.name} wins... {hero.name} has fallen.")\n    print("=" * 46)\n\n# ═══ CREATE FIGHTERS AND BATTLE! ═══\nhero = Fighter("PyKnight", 100, 22, 8, chr(128481))\nboss = Fighter("BugDragon", 120, 18, 5, chr(128009))\nbattle(hero, boss)\n',
  challenge:'<strong>FINAL PROJECT:</strong> Make it EPIC! Add special moves with cooldowns, fight a gauntlet of 3 monsters in a row, add XP and leveling up after each win, create different character classes (Warrior/Mage/Rogue), or build a 2v2 team battle system!',
  hint:'Special moves: add <code>self.special_cooldown = 0</code> and decrement each turn. Gauntlet: put battle() in a loop with a list of monsters. Leveling: <code>hero.attack += 3</code> after each win.',
  check: function(o) { return o.includes("====") || o.includes("VS") || o.length > 300; }
},

];

// ══════════════════════════════════════════════════════════
//  SANDBOX MODE
// ══════════════════════════════════════════════════════════
const SANDBOX = {
  title: "🎨 Free Play Sandbox",
  desc: "This is YOUR space to experiment freely — no challenges, no rules. Write whatever Python you want! Try building a calculator, making ASCII art, creating a password generator, writing a chatbot, simulating a card game, or inventing something totally new.",
  code: '# 🎨 FREE PLAY SANDBOX\n# Write anything you want here!\n#\n# Project ideas to try:\n#   - Build a tip calculator\n#   - Make ASCII art pictures\n#   - Create a random password generator\n#   - Write a simple encryption tool\n#   - Build a to-do list manager\n#   - Simulate a card game\n#   - Make a unit converter (miles to km, etc)\n#   - Build a mini chatbot\n\nimport random\n\nprint("Welcome to the Sandbox!")\nprint("Your imagination is the only limit.")\nprint(f"Here is a random number to start: {random.randint(1, 100)}")\nprint()\n# ↓ Start coding below ↓\n\n',
};

// ══════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ══════════════════════════════════════════════════════════
let currentIdx = 0;
let inSandbox = false;
let completed = new Set();
let pyodide = null;
let editor = null;
let savedCode = {};
let isRunning = false;

function loadState() {
  try {
    var c = localStorage.getItem('pq3_completed');
    if (c) completed = new Set(JSON.parse(c));
    var i = localStorage.getItem('pq3_index');
    if (i !== null) currentIdx = Math.min(parseInt(i), LESSONS.length - 1);
    var s = localStorage.getItem('pq3_saved');
    if (s) savedCode = JSON.parse(s);
  } catch (e) { /* first visit */ }
}

function saveState() {
  try {
    localStorage.setItem('pq3_completed', JSON.stringify(Array.from(completed)));
    localStorage.setItem('pq3_index', String(currentIdx));
    localStorage.setItem('pq3_saved', JSON.stringify(savedCode));
  } catch (e) {}
}

function updateStreak() {
  try {
    var today = new Date().toDateString();
    var lastVisit = localStorage.getItem('pq3_last');
    var streak = parseInt(localStorage.getItem('pq3_streak') || '0');
    if (lastVisit !== today) {
      var yesterday = new Date(Date.now() - 86400000).toDateString();
      streak = (lastVisit === yesterday) ? streak + 1 : 1;
      localStorage.setItem('pq3_streak', String(streak));
      localStorage.setItem('pq3_last', today);
    }
    document.getElementById('streakVal').textContent = streak;
  } catch (e) {}
}

// ══════════════════════════════════════════════════════════
//  INITIALIZATION
// ══════════════════════════════════════════════════════════
async function init() {
  loadState();
  updateStreak();

  // Initialize CodeMirror editor
  editor = CodeMirror.fromTextArea(document.getElementById('editorArea'), {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    autoCloseBrackets: true,
    tabSize: 4,
    indentUnit: 4,
    indentWithTabs: false,
    lineWrapping: true,
    extraKeys: {
      'Tab': function(cm) { cm.replaceSelection('    '); },
      'Ctrl-Enter': function() { runCode(); },
      'Cmd-Enter': function() { runCode(); },
    }
  });

  // Build UI and load the current lesson
  buildSidebar();
  loadLesson(currentIdx);

  // Load Pyodide (Python engine)
  try {
    pyodide = await loadPyodide({
      indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/'
    });

    // Override input() to use browser prompts
    await pyodide.runPythonAsync(
      'import sys\n' +
      'from io import StringIO\n' +
      'class _BrowserInput:\n' +
      '    def readline(self):\n' +
      '        from js import prompt\n' +
      '        result = prompt("Python input:")\n' +
      '        if result is None: result = ""\n' +
      '        print(result)\n' +
      '        return result + "\\n"\n' +
      'sys.stdin = _BrowserInput()\n'
    );

    document.getElementById('loadingScreen').classList.add('hidden');
  } catch (err) {
    console.error('Pyodide load error:', err);
    document.querySelector('.loading h2').textContent = 'Trouble loading Python...';
    document.querySelector('.loading p').textContent =
      'Try refreshing the page. Make sure you have an internet connection.';
  }
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════
function buildSidebar() {
  var container = document.getElementById('sidebarContent');
  var html = '';

  CHAPTERS.forEach(function(ch, ci) {
    // Find all lessons in this chapter
    var chLessons = [];
    for (var li = 0; li < LESSONS.length; li++) {
      if (LESSONS[li].ch === ci) chLessons.push({ lesson: LESSONS[li], idx: li });
    }

    // Check if entire chapter is complete
    var chDone = chLessons.every(function(item) { return completed.has(item.idx); });
    var isCollapsed = localStorage.getItem('pq3_ch' + ci + '_col') === '1';

    html += '<div class="sidebar-section">';
    html += '<div class="chapter-hdr' + (isCollapsed ? ' collapsed' : '') + '" onclick="toggleChapter(' + ci + ', this)">';
    html += '<span class="arrow">▼</span>';
    html += '<span>Ch ' + (ci + 1) + ': ' + ch.name + '</span>';
    html += '<span class="badge' + (chDone ? ' earned' : '') + '">' + ch.badge + '</span>';
    html += '</div>';
    html += '<div class="ch-lessons" style="max-height:' + (isCollapsed ? '0' : '600') + 'px">';

    chLessons.forEach(function(item) {
      var l = item.lesson;
      var gi = item.idx;
      var isActive = gi === currentIdx && !inSandbox;
      var isDone = completed.has(gi);
      var isProject = !!l.project;

      html += '<button class="lesson-btn';
      if (isActive) html += ' active';
      if (isDone) html += ' completed';
      if (isProject) html += ' project';
      html += '" onclick="loadLesson(' + gi + ')">';
      html += '<span class="em">' + l.emoji + '</span>';
      html += '<span class="label">' + l.title + '</span>';
      html += '<span class="check">' + (isDone ? '✅' : '○') + '</span>';
      html += '</button>';
    });

    html += '</div></div>';
  });

  container.innerHTML = html;

  // Update sandbox button state
  document.getElementById('sandboxLink').classList.toggle('active', inSandbox);

  // Update progress bar
  updateProgress();
}

function toggleChapter(ci, el) {
  el.classList.toggle('collapsed');
  var lessonsDiv = el.nextElementSibling;
  if (el.classList.contains('collapsed')) {
    lessonsDiv.style.maxHeight = '0px';
    localStorage.setItem('pq3_ch' + ci + '_col', '1');
  } else {
    lessonsDiv.style.maxHeight = '600px';
    localStorage.removeItem('pq3_ch' + ci + '_col');
  }
}

function updateProgress() {
  var pct = (completed.size / LESSONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressVal').textContent = completed.size + '/' + LESSONS.length;
}

// ══════════════════════════════════════════════════════════
//  LESSON LOADING
// ══════════════════════════════════════════════════════════
function saveCurrentCode() {
  if (!editor) return;
  var key = inSandbox ? 'sandbox' : String(currentIdx);
  savedCode[key] = editor.getValue();
}

function loadLesson(index) {
  saveCurrentCode();
  inSandbox = false;
  currentIdx = index;
  saveState();

  var lesson = LESSONS[index];

  // Update lesson info panel
  document.getElementById('lessonNum').textContent =
    'Mission ' + (index + 1) + ' of ' + LESSONS.length;
  document.getElementById('lessonTitle').textContent =
    lesson.emoji + ' ' + lesson.title;
  document.getElementById('lessonDesc').innerHTML = lesson.desc;
  document.getElementById('challengeText').innerHTML = lesson.challenge;
  document.getElementById('hintText').innerHTML = lesson.hint;

  // Show challenge box and hint button
  document.getElementById('challengeBox').style.display = 'flex';
  document.getElementById('hintBtn').style.display = '';
  document.getElementById('hintBox').classList.remove('show');

  // Concept chips
  document.getElementById('chips').innerHTML =
    lesson.concepts.map(function(c) {
      return '<span class="chip">' + c + '</span>';
    }).join('');

  // Load code — use saved code if available, otherwise starter code
  var code = savedCode[String(index)] || lesson.code;
  editor.setValue(code);
  editor.clearHistory();
  setTimeout(function() { editor.refresh(); }, 20);

  // Refresh sidebar and clear output
  buildSidebar();
  clearOutput();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function loadSandbox() {
  saveCurrentCode();
  inSandbox = true;

  document.getElementById('lessonNum').textContent = 'Free Play';
  document.getElementById('lessonTitle').textContent = SANDBOX.title;
  document.getElementById('lessonDesc').innerHTML = SANDBOX.desc;

  // Hide challenge and hint for sandbox
  document.getElementById('challengeBox').style.display = 'none';
  document.getElementById('hintBtn').style.display = 'none';
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('chips').innerHTML = '';

  var code = savedCode['sandbox'] || SANDBOX.code;
  editor.setValue(code);
  editor.clearHistory();
  setTimeout(function() { editor.refresh(); }, 20);

  buildSidebar();
  clearOutput();
  document.getElementById('sidebar').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════
function resetCode() {
  if (inSandbox) {
    editor.setValue(SANDBOX.code);
    delete savedCode['sandbox'];
  } else {
    editor.setValue(LESSONS[currentIdx].code);
    delete savedCode[String(currentIdx)];
  }
  editor.clearHistory();
  saveState();
}

function toggleHint() {
  document.getElementById('hintBox').classList.toggle('show');
}

function clearOutput() {
  document.getElementById('outputWrap').innerHTML =
    '<div class="output-placeholder">' +
    '<span class="big-emoji">👆</span>' +
    'Hit <strong>▶ Run</strong> to see your code come to life!' +
    '</div>';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ══════════════════════════════════════════════════════════
//  CODE EXECUTION
// ══════════════════════════════════════════════════════════
async function runCode() {
  if (!pyodide) {
    alert('Python is still loading — please wait a moment!');
    return;
  }
  if (isRunning) return;
  isRunning = true;

  var btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Running...';

  // Save current code
  saveCurrentCode();
  saveState();

  // Clear output area
  var outputWrap = document.getElementById('outputWrap');
  outputWrap.innerHTML = '';

  var code = editor.getValue();

  try {
    // Redirect stdout and stderr
    await pyodide.runPythonAsync(
      'import sys\n' +
      'from io import StringIO\n' +
      'sys.stdout = StringIO()\n' +
      'sys.stderr = StringIO()\n'
    );

    // Run the user's code
    try {
      await pyodide.runPythonAsync(code);
    } catch (pyErr) {
      // Get any partial output before the error
      var partialOutput = await pyodide.runPythonAsync('sys.stdout.getvalue()');
      if (partialOutput) appendOutput(partialOutput, 'stdout');
      appendOutput(formatError(pyErr.message), 'stderr');
      finishRun();
      return;
    }

    // Get captured output
    var stdout = await pyodide.runPythonAsync('sys.stdout.getvalue()');
    var stderr = await pyodide.runPythonAsync('sys.stderr.getvalue()');

    if (stdout) appendOutput(stdout, 'stdout');
    if (stderr) appendOutput(stderr, 'stderr');

    if (!stdout && !stderr) {
      outputWrap.innerHTML =
        '<div class="output-line system">' +
        '✅ Code ran successfully! (No output — try adding a print() statement)' +
        '</div>';
    }

    // Check if challenge is completed
    if (!inSandbox && stdout) {
      var lesson = LESSONS[currentIdx];
      if (lesson.check(stdout) && !completed.has(currentIdx)) {
        completed.add(currentIdx);
        saveState();
        updateProgress();
        buildSidebar();
        showSuccess();
        checkChapterBadge(lesson.ch);
      }
    }

  } catch (err) {
    appendOutput(formatError(err.message), 'stderr');
  }

  // Restore stdout/stderr
  try {
    await pyodide.runPythonAsync(
      'import sys\n' +
      'sys.stdout = sys.__stdout__\n' +
      'sys.stderr = sys.__stderr__\n'
    );
  } catch (e) {}

  finishRun();
}

function finishRun() {
  var btn = document.getElementById('runBtn');
  btn.disabled = false;
  btn.textContent = '▶ Run';
  isRunning = false;
}

function formatError(msg) {
  // Clean up Pyodide traces to be less scary for kids
  var lines = msg.split('\n');
  var relevant = [];
  var capturing = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.indexOf('Error') !== -1 || line.indexOf('error') !== -1) {
      capturing = true;
    }
    if (capturing || line.trim().indexOf('File "<exec>"') === 0) {
      relevant.push(line);
    }
  }
  if (relevant.length > 0) {
    return '❌ Oops! ' + relevant.join('\n');
  }
  return '❌ Oops! ' + msg;
}

function appendOutput(text, type) {
  var wrap = document.getElementById('outputWrap');
  var lines = text.split('\n');
  // Remove trailing empty line
  if (lines.length > 0 && lines[lines.length - 1] === '') {
    lines.pop();
  }
  for (var i = 0; i < lines.length; i++) {
    var div = document.createElement('div');
    div.className = 'output-line ' + type;
    div.textContent = lines[i];
    wrap.appendChild(div);
  }
}

// ══════════════════════════════════════════════════════════
//  CELEBRATIONS
// ══════════════════════════════════════════════════════════
var SUCCESS_MESSAGES = [
  "🎉 Mission Complete!",
  "⭐ Nailed it!",
  "🚀 You're a natural!",
  "🏆 Challenge crushed!",
  "💪 Awesome work!",
  "🌟 Brilliant!",
  "🎯 Bullseye!",
  "🐍 Python pro in the making!",
  "🔥 On fire!",
  "✨ Spectacular!",
  "🎮 Level up!",
  "💎 Flawless!",
];

function showSuccess() {
  var toast = document.getElementById('successToast');
  var msg = SUCCESS_MESSAGES[Math.floor(Math.random() * SUCCESS_MESSAGES.length)];
  document.getElementById('successMsg').textContent = msg;
  toast.classList.add('show');
  launchConfetti();
  setTimeout(function() { toast.classList.remove('show'); }, 3500);
}

function checkChapterBadge(chapterIndex) {
  // Check if all lessons in this chapter are complete
  var chapterLessons = [];
  for (var i = 0; i < LESSONS.length; i++) {
    if (LESSONS[i].ch === chapterIndex) {
      chapterLessons.push(i);
    }
  }

  var allDone = chapterLessons.every(function(idx) {
    return completed.has(idx);
  });

  if (allDone) {
    var ch = CHAPTERS[chapterIndex];
    // Show badge toast after success toast
    setTimeout(function() {
      document.getElementById('badgeIcon').textContent = ch.badge;
      document.getElementById('badgeTitle').textContent = ch.name + ' Complete!';
      document.getElementById('badgeSub').textContent =
        'You earned the ' + ch.badge + ' badge!';
      var badgeToast = document.getElementById('badgeToast');
      badgeToast.classList.add('show');
      launchConfetti();
      setTimeout(function() {
        badgeToast.classList.remove('show');
      }, 4500);
    }, 4000);
  }
}

function launchConfetti() {
  var container = document.getElementById('confettiBox');
  var colors = ['#2de2e6', '#f5c842', '#0eff9d', '#ff4f7b', '#b07aff', '#ff9f43'];

  for (var i = 0; i < 55; i++) {
    var bit = document.createElement('div');
    bit.className = 'confetti-bit';
    bit.style.left = (Math.random() * 100) + '%';
    bit.style.background = colors[Math.floor(Math.random() * colors.length)];
    bit.style.width = (Math.random() * 8 + 4) + 'px';
    bit.style.height = (Math.random() * 8 + 4) + 'px';
    bit.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    bit.style.animationDelay = (Math.random() * 0.6) + 's';
    container.appendChild(bit);
  }

  setTimeout(function() { container.innerHTML = ''; }, 4500);
}

// ══════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUT
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ══════════════════════════════════════════════════════════
//  START THE APP!
// ══════════════════════════════════════════════════════════
init();

</script>
